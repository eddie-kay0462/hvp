<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Roof outline (dark green) -->
  <polyline
    points="10,58 50,18 90,58"
    fill="none"
    stroke="#124919"
    stroke-width="9"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Left wall -->
  <line x1="10" y1="58" x2="10" y2="82" stroke="#124919" stroke-width="9" stroke-linecap="round"/>
  <!-- Right wall -->
  <line x1="90" y1="58" x2="90" y2="82" stroke="#124919" stroke-width="9" stroke-linecap="round"/>

  <!-- Three orange pillars -->
  <rect x="30" y="44" width="10" height="38" rx="3" fill="#E57E00"/>
  <rect x="45" y="38" width="10" height="44" rx="3" fill="#E57E00"/>
  <rect x="60" y="44" width="10" height="38" rx="3" fill="#E57E00"/>
</svg>
